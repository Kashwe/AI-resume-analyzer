<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0d12;
      --ink-mid: #3a3a4a;
      --ink-soft: #7a7a92;
      --paper: #f5f4f0;
      --paper-warm: #edeae2;
      --accent: #e84040;
      --accent-2: #2b5ce6;
      --accent-3: #00b87a;
      --glow: rgba(232,64,64,0.12);
      --radius: 14px;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --display: 'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .page { max-width: 900px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Header ── */
    header {
      padding: 48px 0 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid var(--ink);
      margin-bottom: 48px;
    }
    .logo-mark {
      width: 48px; height: 48px;
      background: var(--ink);
      border-radius: 12px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 26px; height: 26px; }
    header h1 {
      font-family: var(--display);
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    header h1 span { color: var(--accent); }
    header p {
      margin-top: 4px;
      color: var(--ink-soft);
      font-size: 13px;
      font-family: var(--mono);
    }

    /* ── Upload Section ── */
    .upload-section { margin-bottom: 36px; }
    .upload-section h2 {
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 12px;
    }

    .drop-zone {
      border: 2px dashed #c4c0b8;
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: white;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragging {
      border-color: var(--accent);
      background: var(--glow);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon {
      width: 44px; height: 44px;
      background: var(--paper-warm);
      border-radius: 10px;
      display: grid; place-items: center;
      margin: 0 auto 12px;
    }
    .drop-zone .label {
      font-family: var(--display);
      font-weight: 700;
      font-size: 15px;
    }
    .drop-zone .sub {
      font-size: 12px;
      color: var(--ink-soft);
      font-family: var(--mono);
      margin-top: 4px;
    }
    .file-selected {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: white;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 400;
    }
    .file-selected.show { display: flex; }
    .file-dot { width: 8px; height: 8px; background: var(--accent-3); border-radius: 50%; flex-shrink: 0; }
    .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-remove {
      background: none; border: none; cursor: pointer;
      color: var(--ink-soft); font-size: 18px; line-height: 1;
      padding: 0 4px;
    }
    .file-remove:hover { color: var(--accent); }

    /* ── JD Input ── */
    .jd-section { margin-bottom: 28px; }
    .jd-section h2 {
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 12px;
    }
    .jd-section textarea {
      width: 100%;
      min-height: 130px;
      padding: 16px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      border: 2px solid #c4c0b8;
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      resize: vertical;
      transition: border-color .2s;
      outline: none;
    }
    .jd-section textarea:focus { border-color: var(--accent-2); }
    .jd-section .optional-tag {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--ink-soft);
      margin-left: 8px;
      font-weight: 300;
    }

    /* ── Analyze Button ── */
    .analyze-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--ink);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      letter-spacing: 0.3px;
    }
    .analyze-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(13,13,18,0.18);
    }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .analyze-btn .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .analyze-btn.loading .spinner { display: block; }
    .analyze-btn.loading .btn-text { opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── API URL Config ── */
    .config-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding: 12px 16px;
      background: var(--paper-warm);
      border-radius: 10px;
      font-family: var(--mono);
      font-size: 12px;
    }
    .config-row label { color: var(--ink-soft); white-space: nowrap; }
    .config-row input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink);
    }

    /* ── Error Banner ── */
    .error-banner {
      display: none;
      padding: 14px 18px;
      background: #fff0f0;
      border: 1.5px solid #f5b8b8;
      border-radius: var(--radius);
      color: #c0392b;
      font-size: 13px;
      font-family: var(--mono);
      margin-bottom: 24px;
    }
    .error-banner.show { display: block; }

    /* ── Results ── */
    .results { display: none; animation: fadeUp .4s ease; }
    .results.show { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1.5px solid var(--paper-warm);
    }
    .results-header h2 {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 800;
    }
    .results-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-soft);
    }

    /* ── Score Ring ── */
    .score-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 28px;
      align-items: center;
      padding: 28px;
      background: white;
      border-radius: var(--radius);
      border: 1.5px solid var(--paper-warm);
      margin-bottom: 24px;
    }
    .score-ring-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
    .score-ring-wrap svg { transform: rotate(-90deg); }
    .score-ring-center {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      text-align: center;
    }
    .score-num {
      font-family: var(--display);
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }
    .score-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--ink-soft);
      letter-spacing: 1px;
    }
    .score-info h3 {
      font-family: var(--display);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .score-info .verdict {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink-mid);
    }

    /* ── Section Cards ── */
    .card {
      background: white;
      border-radius: var(--radius);
      border: 1.5px solid var(--paper-warm);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-family: var(--display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: '';
      display: block;
      width: 4px; height: 14px;
      border-radius: 2px;
      background: var(--accent);
    }

    /* ── Skill Pills ── */
    .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 100px;
      background: var(--paper-warm);
      color: var(--ink);
      border: 1.5px solid transparent;
    }
    .pill.tech { border-color: var(--accent-2); color: var(--accent-2); background: rgba(43,92,230,.06); }
    .pill.soft { border-color: var(--accent-3); color: var(--accent-3); background: rgba(0,184,122,.06); }
    .pill.cert { border-color: var(--accent); color: var(--accent); background: rgba(232,64,64,.06); }

    .skill-group { margin-bottom: 16px; }
    .skill-group-label {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--ink-soft);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Criteria Bars ── */
    .criterion {
      margin-bottom: 16px;
    }
    .criterion-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .criterion-name {
      font-size: 13px;
      font-weight: 500;
    }
    .criterion-score {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-soft);
    }
    .bar-track {
      height: 6px;
      background: var(--paper-warm);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s cubic-bezier(0.22,1,0.36,1);
    }
    .criterion-feedback {
      font-size: 12px;
      color: var(--ink-soft);
      font-family: var(--mono);
      line-height: 1.5;
    }

    /* ── Improvements ── */
    .improvement-list { list-style: none; }
    .improvement-list li {
      padding: 12px 0;
      border-bottom: 1px solid var(--paper-warm);
      font-size: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .improvement-list li:last-child { border-bottom: none; }
    .imp-num {
      font-family: var(--mono);
      font-size: 11px;
      color: white;
      background: var(--accent);
      border-radius: 6px;
      width: 20px; height: 20px;
      display: grid; place-items: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Job Match ── */
    .match-score-chip {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      font-family: var(--display);
      font-weight: 800;
    }
    .match-score-chip .big { font-size: 36px; }
    .match-score-chip .pct { font-size: 18px; color: var(--ink-soft); }

    .skills-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 16px;
    }
    @media (max-width: 600px) { .skills-split { grid-template-columns: 1fr; } }

    .skills-col-title {
      font-size: 11px;
      font-family: var(--mono);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-green { background: var(--accent-3); }
    .dot-red { background: var(--accent); }

    .match-summary {
      margin-top: 16px;
      padding: 14px;
      background: var(--paper-warm);
      border-radius: 10px;
      font-size: 13px;
      font-family: var(--mono);
      line-height: 1.6;
    }

    /* ── Experience Badge ── */
    .exp-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--ink);
      color: white;
      border-radius: 100px;
      font-family: var(--display);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .exp-badge .years {
      font-family: var(--mono);
      font-size: 11px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="3" width="13" height="2" rx="1" fill="white"/>
        <rect x="4" y="8" width="18" height="2" rx="1" fill="white"/>
        <rect x="4" y="13" width="10" height="2" rx="1" fill="white"/>
        <circle cx="19" cy="18" r="5" fill="none" stroke="#e84040" stroke-width="2"/>
        <path d="M22.5 21.5L25 24" stroke="#e84040" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <h1>AI Resume <span>Analyzer</span></h1>
      <p>Powered by LangChain + Groq LLM · ATS scoring · Skill extraction</p>
    </div>
  </header>

  <!-- API URL Config -->
  <div class="config-row">
    <label>API →</label>
    <input id="apiUrl" type="text" value="ai-resume-analyzer-ekekbkcwgna2hsaa.centralindia-01.azurewebsites.net" spellcheck="false" />
  </div>

  <!-- Upload -->
  <div class="upload-section">
    <h2>01 — Resume PDF</h2>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="pdfInput" accept=".pdf" />
      <div class="drop-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2v11M10 2L7 5M10 2l3 3" stroke="#7a7a92" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 14v2a1 1 0 001 1h12a1 1 0 001-1v-2" stroke="#7a7a92" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="label">Drop your resume PDF here</div>
      <div class="sub">or click to browse · max 10 MB</div>
    </div>
    <div class="file-selected" id="fileSelected">
      <span class="file-dot"></span>
      <span class="file-name" id="fileName"></span>
      <button class="file-remove" id="removeFile" title="Remove">×</button>
    </div>
  </div>




  <!-- Job Search -->
<div class="jd-section">

  <h2>02 — Search Real Jobs</h2>

  <div style="display:flex; gap:10px; margin-bottom:16px;">

    <input
      type="text"
      id="jobRole"
      placeholder="Job role e.g. Data Analyst"
      style="
        flex:1;
        padding:14px;
        border:2px solid #c4c0b8;
        border-radius:12px;
        font-family: var(--mono);
      "
    >

    <input
      type="text"
      id="jobLocation"
      placeholder="Location"
      value="India"
      style="
        width:160px;
        padding:14px;
        border:2px solid #c4c0b8;
        border-radius:12px;
        font-family: var(--mono);
      "
    >

    <button
      id="searchJobsBtn"
      style="
        padding:14px 22px;
        border:none;
        border-radius:12px;
        background:black;
        color:white;
        font-family:var(--display);
        cursor:pointer;
      "
    >
      Search
    </button>

  </div>

  <div id="jobResults"></div>

</div>






  <!-- JD -->
  <div class="jd-section">
    <h2>02 — Job Description <span class="optional-tag">optional — enables match scoring</span></h2>
    <textarea id="jdInput" placeholder="Paste the job description here to get a match score and keyword gap analysis…"></textarea>
  </div>

  <!-- Error -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- Analyze -->
  <button class="analyze-btn" id="analyzeBtn" disabled>
    <div class="spinner"></div>
    <span class="btn-text">Analyze Resume</span>
  </button>

  <!-- Results -->
  <div class="results" id="results" style="margin-top:48px;"></div>
</div>

<script>
const API = () => document.getElementById('apiUrl').value.replace(/\/$/, '');
const dropZone = document.getElementById('dropZone');
const pdfInput = document.getElementById('pdfInput');
const fileSelected = document.getElementById('fileSelected');
const fileName = document.getElementById('fileName');
const removeFile = document.getElementById('removeFile');
const analyzeBtn = document.getElementById('analyzeBtn');
const jdInput = document.getElementById('jdInput');
const errorBanner = document.getElementById('errorBanner');
const resultsDiv = document.getElementById('results');

const searchJobsBtn = document.getElementById('searchJobsBtn');
const jobResults = document.getElementById('jobResults');

let selectedFile = null;


searchJobsBtn.addEventListener('click', async () => {

  const role = document.getElementById('jobRole').value.trim();
  const location = document.getElementById('jobLocation').value.trim();

  if (!role) {
    showError('Please enter a job role');
    return;
  }

  clearError();

  try {

    const response = await fetch(
      `${API()}/search-jobs?role=${encodeURIComponent(role)}&location=${encodeURIComponent(location)}`
    );

    if (!response.ok) {
      throw new Error('Failed to fetch jobs');
    }

    const data = await response.json();

    renderJobs(data.jobs);

  } catch (error) {
    showError(error.message);
  }
});


// ── File Handling ─────────────────────────────────────────
function setFile(file) {
  if (!file || !file.name.endsWith('.pdf')) {
    showError('Please select a PDF file.');
    return;
  }
  selectedFile = file;
  fileName.textContent = file.name;
  fileSelected.classList.add('show');
  dropZone.style.display = 'none';
  analyzeBtn.disabled = false;
  clearError();
}

pdfInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragging');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});

removeFile.addEventListener('click', () => {
  selectedFile = null;
  pdfInput.value = '';
  fileSelected.classList.remove('show');
  dropZone.style.display = '';
  analyzeBtn.disabled = true;
  resultsDiv.classList.remove('show');
  clearError();
});

// ── Error Handling ────────────────────────────────────────
function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add('show');
}
function clearError() {
  errorBanner.classList.remove('show');
  errorBanner.textContent = '';
}

// ── Analyze ───────────────────────────────────────────────
analyzeBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  analyzeBtn.classList.add('loading');
  analyzeBtn.disabled = true;
  clearError();
  resultsDiv.classList.remove('show');
  resultsDiv.innerHTML = '';

  const formData = new FormData();
  formData.append('file', selectedFile);
  const jd = jdInput.value.trim();
  if (jd) formData.append('job_description', jd);

  try {
    const resp = await fetch(`${API()}/analyze`, { method: 'POST', body: formData });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    renderResults(data);
  } catch (e) {
    showError(`Error: ${e.message}. Make sure the backend is running at ${API()}`);
  } finally {
    analyzeBtn.classList.remove('loading');
    analyzeBtn.disabled = false;
  }
});

// ── Render Results ────────────────────────────────────────
function renderResults(data) {
  const { skills, ats_score, job_match, filename, extracted_text_length } = data;

  const getBarColor = s => s >= 75 ? '#00b87a' : s >= 50 ? '#e8a020' : '#e84040';

  let html = `
    <div class="results-header">
      <h2>Analysis Results</h2>
      <div class="results-meta">${filename} · ${(extracted_text_length/1000).toFixed(1)}k chars extracted</div>
    </div>`;

  // ── ATS Score Ring ──
  const score = ats_score.overall_score;
  const circ = 2 * Math.PI * 46;
  const dash = (score / 100) * circ;
  const ringColor = getBarColor(score);

  html += `
  <div class="score-row">
    <div class="score-ring-wrap">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="46" fill="none" stroke="#edeae2" stroke-width="8"/>
        <circle cx="55" cy="55" r="46" fill="none" stroke="${ringColor}" stroke-width="8"
          stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
          stroke-linecap="round"/>
      </svg>
      <div class="score-ring-center">
        <div class="score-num" style="color:${ringColor}">${score}</div>
        <div class="score-label">ATS SCORE</div>
      </div>
    </div>
    <div class="score-info">
      <h3>ATS Compatibility</h3>
      <div class="verdict">${ats_score.verdict}</div>
    </div>
  </div>`;

  // ── Skills ──
  html += `<div class="card">
    <div class="card-title">Extracted Skills</div>`;

  if (skills.experience_level) {
    html += `<div class="exp-badge">${skills.experience_level} Level
      ${skills.years_of_experience ? `<span class="years">${skills.years_of_experience}</span>` : ''}</div>`;
  }
  if (skills.technical_skills.length) {
    html += `<div class="skill-group">
      <div class="skill-group-label">Technical</div>
      <div class="pill-group">${skills.technical_skills.map(s => `<span class="pill tech">${s}</span>`).join('')}</div>
    </div>`;
  }
  if (skills.soft_skills.length) {
    html += `<div class="skill-group">
      <div class="skill-group-label">Soft Skills</div>
      <div class="pill-group">${skills.soft_skills.map(s => `<span class="pill soft">${s}</span>`).join('')}</div>
    </div>`;
  }
  if (skills.domain_knowledge.length) {
    html += `<div class="skill-group">
      <div class="skill-group-label">Domain Knowledge</div>
      <div class="pill-group">${skills.domain_knowledge.map(s => `<span class="pill">${s}</span>`).join('')}</div>
    </div>`;
  }
  if (skills.certifications.length) {
    html += `<div class="skill-group">
      <div class="skill-group-label">Certifications</div>
      <div class="pill-group">${skills.certifications.map(s => `<span class="pill cert">${s}</span>`).join('')}</div>
    </div>`;
  }
  html += `</div>`;

  // ── ATS Criteria Breakdown ──
  html += `<div class="card">
    <div class="card-title">ATS Criteria Breakdown</div>`;

  for (const c of ats_score.criteria_scores) {
    const col = getBarColor(c.score);
    html += `<div class="criterion">
      <div class="criterion-header">
        <span class="criterion-name">${c.criterion}</span>
        <span class="criterion-score">${c.score}/100</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${c.score}%;background:${col}"></div></div>
      <div class="criterion-feedback">${c.feedback}</div>
    </div>`;
  }
  html += `</div>`;

  // ── Improvements ──
  if (ats_score.top_improvements.length) {
    html += `<div class="card">
      <div class="card-title">Top Improvements</div>
      <ul class="improvement-list">
        ${ats_score.top_improvements.map((imp, i) =>
          `<li><span class="imp-num">${i+1}</span>${imp}</li>`
        ).join('')}
      </ul>
    </div>`;
  }

  // ── Strengths ──
  if (ats_score.strengths.length) {
    html += `<div class="card">
      <div class="card-title">Strengths</div>
      <div class="pill-group">
        ${ats_score.strengths.map(s => `<span class="pill soft">✓ ${s}</span>`).join('')}
      </div>
    </div>`;
  }

  // ── Job Match ──
  if (job_match) {
    const mc = getBarColor(job_match.match_score);
    html += `<div class="card">
      <div class="card-title">Job Description Match</div>
      <div class="match-score-chip" style="color:${mc}">
        <span class="big">${Math.round(job_match.match_score)}</span>
        <span class="pct">%</span>
      </div>
      <div class="skills-split">
        <div>
          <div class="skills-col-title"><span class="dot dot-green"></span>Matched Skills</div>
          <div class="pill-group">${job_match.matched_skills.map(s => `<span class="pill soft">${s}</span>`).join('') || '<span style="color:#aaa;font-size:12px;font-family:var(--mono)">None</span>'}</div>
        </div>
        <div>
          <div class="skills-col-title"><span class="dot dot-red"></span>Missing Skills</div>
          <div class="pill-group">${job_match.missing_skills.map(s => `<span class="pill cert">${s}</span>`).join('') || '<span style="color:#aaa;font-size:12px;font-family:var(--mono)">None</span>'}</div>
        </div>
      </div>
      <div class="match-summary">${job_match.summary}</div>
    </div>`;
  }

  resultsDiv.innerHTML = html;
  resultsDiv.classList.add('show');
  resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}



function renderJobs(jobs) {

  if (!jobs.length) {
    jobResults.innerHTML = '<p>No jobs found.</p>';
    return;
  }

  jobResults.innerHTML = jobs.map(job => `

    <div class="card">

      <h3>${job.title}</h3>

      <p>
        <strong>${job.company || 'Unknown Company'}</strong>
      </p>

      <p style="margin-top:4px;color:#666;">
        ${job.location || ''}
      </p>

      <button
        onclick='selectJob(${JSON.stringify(job.description)})'
        style="
          margin-top:12px;
          padding:10px 18px;
          border:none;
          border-radius:10px;
          background:black;
          color:white;
          cursor:pointer;
        "
      >
        Use This JD
      </button>

    </div>

  `).join('');
}

function selectJob(description) {

  jdInput.value = description;

  jdInput.scrollIntoView({
    behavior: 'smooth'
  });
}
</script>
</body>
</html>
